id: it.laziocrea.cup
canonical: https://www.fhir.laziocrea.it
name: LazioCreaCUPIRTImplementationGuide
title: "Gestione Agende CUP Regione Lazio (Lazio Crea) → Telemedicina nazionale IRT"
description: >-
  Implementation Guide FHIR R4 per la gestione delle agende del Centro Unico
  di Prenotazione (CUP) della Regione Lazio, gestite da Lazio Crea, e per
  l'invio delle prenotazioni alla piattaforma di Telemedicina nazionale IRT.
  Modella Schedule, Slot, Appointment e ServiceRequest per l'interoperabilità
  con la PNLA (Piattaforma Nazionale Liste di Attesa).
status: draft
version: 0.2.0
fhirVersion: 4.0.1
copyrightYear: 2025+
releaseLabel: ci-build
license: CC0-1.0
jurisdiction: urn:iso:std:iso:3166#IT "Italy"
publisher:
  name: Lazio Crea
  url: https://www.laziocrea.it

